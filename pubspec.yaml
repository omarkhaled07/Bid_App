name: bid

description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  # Utility packages
  http: ^1.3.0
  intl: ^0.20.2
  logger: ^2.5.0
  url_launcher: ^6.3.1
  flutter_native_splash: ^2.4.4
  firebase_auth: ^5.4.2
  firebase_core: ^3.11.0
  cloud_firestore: ^5.6.3
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^1.2.0+3
  get: ^4.6.6
  get_storage: ^2.1.1
  shared_preferences: ^2.5.1
  image_picker: ^1.1.2
  firebase_storage: ^12.4.2
  pure_dart_ui: ^0.1.10
  path_drawing: ^1.0.1
  firebase_database: ^11.3.3
  circular_countdown_timer: ^0.2.4
  font_awesome_flutter: ^10.8.0
  dio: ^5.8.0+1
  webview_flutter: ^4.10.0
  cached_network_image: ^3.4.1
  flutter_paypal_payment: ^1.0.8
  flutter_svg: ^2.0.17
  flutter_credit_card: ^4.1.0
  dartz: ^0.10.1
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  agora_rtc_engine: ^6.5.1
  livekit_client: ^2.4.9
  permission_handler: ^11.4.0
  share_plus: ^11.0.0
  webrtc_interface: ^1.2.2+hotfix.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Logos/Logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/Images/BidApp_Ico22n.png
    - assets/Images/facebook.png
    - assets/Images/google.png
    - assets/Images/on_boarding_images/sammy-line-delivery.gif
    - assets/Images/on_boarding_images/sammy-line-no-connection.gif
    - assets/Images/on_boarding_images/sammy-line-searching.gif
    - assets/Images/on_boarding_images/sammy-line-shopping.gif
    - assets/Images/shoe.png
  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
